        button {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);

        @media (max-width: 768px) {

<body>
    <div class="container">
        <header>
            <h1>DNS Lookup Tool</h1>
            <p class="subtitle">Educational DNS record reconnaissance simulator</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label for="domain">Domain Name</label>
                <input type="text" id="domain" placeholder="example.com">
            </div>

            <button onclick="performDNSLookup()">Lookup DNS Records</button>
        </div>

        <div class="card results" id="results">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('a')">A Records</button>
                <button class="tab-btn" onclick="switchTab('aaaa')">AAAA Records</button>
                <button class="tab-btn" onclick="switchTab('cname')">CNAME</button>
                <button class="tab-btn" onclick="switchTab('mx')">MX Records</button>
                <button class="tab-btn" onclick="switchTab('txt')">TXT Records</button>
                <button class="tab-btn" onclick="switchTab('ns')">NS Records</button>
                <button class="tab-btn" onclick="switchTab('soa')">SOA Record</button>
            </div>

            <div id="a" class="tab-content active">
                <h3 style="margin-bottom: 16px; color: #cbd5e1;">A Records (IPv4)</h3>
                <div id="aContent"></div>
            </div>

            <div id="aaaa" class="tab-content">
                <h3 style="margin-bottom: 16px; color: #cbd5e1;">AAAA Records (IPv6)</h3>
                <div id="aaaaContent"></div>
            </div>

            <div id="cname" class="tab-content">
                <h3 style="margin-bottom: 16px; color: #cbd5e1;">CNAME Records</h3>
                <div id="cnameContent"></div>
            </div>

            <div id="mx" class="tab-content">
                <h3 style="margin-bottom: 16px; color: #cbd5e1;">MX Records (Mail Exchange)</h3>
                <div id="mxContent"></div>
            </div>

            <div id="txt" class="tab-content">
                <h3 style="margin-bottom: 16px; color: #cbd5e1;">TXT Records</h3>
                <div id="txtContent"></div>
            </div>

            <div id="ns" class="tab-content">
                <h3 style="margin-bottom: 16px; color: #cbd5e1;">NS Records (Nameservers)</h3>
                <div id="nsContent"></div>
            </div>

            <div id="soa" class="tab-content">
                <h3 style="margin-bottom: 16px; color: #cbd5e1;">SOA Record (Start of Authority)</h3>
                <div id="soaContent"></div>
            </div>
        </div>

        <footer>
            © 2026 bugbountyreality.com — Bug Bounty & Security Tools
        </footer>
<div style="margin:20px auto;max-width:728px;text-align:center">

</div>
    </div>

    <script>
        const dnsData = {
            'example.com': {
                a: ['93.184.216.34'],
                aaaa: ['2606:2800:220:1:248:1893:25c8:1946'],
                cname: [],
                mx: [
                    { priority: 10, host: 'mail.example.com' },
                    { priority: 20, host: 'mail2.example.com' }
                ],
                txt: [
                    'v=spf1 include:_spf.example.com ~all',
                    'google-site-verification=abc123',
                    'dmarc=v=DMARC1; p=quarantine'
                ],
                ns: ['ns1.example.com', 'ns2.example.com', 'ns3.example.com', 'ns4.example.com'],
                soa: {
                    primary: 'ns1.example.com',
                    admin: 'admin.example.com',
                    serial: 2024060901,
                    refresh: 10800,
                    retry: 3600,
                    expire: 604800,
                    ttl: 86400
                }
            },
            'google.com': {
                a: ['142.250.185.46'],
                aaaa: ['2607:f8b0:4004:817::200e'],
                cname: [],
                mx: [
                    { priority: 5, host: 'gmail-smtp-in.l.google.com' },
                    { priority: 10, host: 'alt1.gmail-smtp-in.l.google.com' }
                ],
                txt: [
                    'v=spf1 include:_spf.google.com ~all',
                    'google-site-verification=xyz789',
                    'v=DMARC1; p=reject; rua=mailto:dmarc@google.com'
                ],
                ns: ['ns1.google.com', 'ns2.google.com', 'ns3.google.com', 'ns4.google.com'],
                soa: {
                    primary: 'ns1.google.com',
                    admin: 'admin.google.com',
                    serial: 2024060901,
                    refresh: 900,
                    retry: 900,
                    expire: 1800,
                    ttl: 300
                }
            }
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function performDNSLookup() {
            const domain = document.getElementById('domain').value.trim().toLowerCase();
            if (!domain) {
                alert('Please enter a domain name');
                return;
            }

            const data = dnsData[domain] || generateMockDNS(domain);
            displayResults(domain, data);
            document.getElementById('results').classList.add('active');
        }

        function generateMockDNS(domain) {
            const ip = Math.floor(Math.random() * 256) + '.' + Math.floor(Math.random() * 256) + '.' + Math.floor(Math.random() * 256) + '.' + Math.floor(Math.random() * 256);
            return {
                a: [ip],
                aaaa: ['2001:db8::' + Math.random().toString(16).substr(2, 8)],
                cname: [],
                mx: [{ priority: 10, host: 'mail.' + domain }],
                txt: ['v=spf1 include:_spf.' + domain + ' ~all'],
                ns: ['ns1.' + domain, 'ns2.' + domain],
                soa: {
                    primary: 'ns1.' + domain,
                    admin: 'admin.' + domain,
                    serial: 2024060901,
                    refresh: 10800,
                    retry: 3600,
                    expire: 604800,
                    ttl: 86400
                }
            };
        }

        function displayResults(domain, data) {
            // A Records
            document.getElementById('aContent').innerHTML = data.a.map(ip => `
                <div class="record-type">
                    <div class="record-data">${ip}</div>
                    <div class="record-explanation">
                        IPv4 address for ${domain}. Used for routing traffic to the server.
                    </div>
                    <div class="security-note">
                        <strong>Security Note:</strong> A records can reveal infrastructure. Attackers use A record lookups during reconnaissance to identify targets and potential server locations.
                    </div>
                </div>
            `).join('');

            // AAAA Records
            document.getElementById('aaaaContent').innerHTML = data.aaaa.map(ip => `
                <div class="record-type">
                    <div class="record-data">${ip}</div>
                    <div class="record-explanation">
                        IPv6 address for ${domain}. Modern version of A records for IPv6 traffic.
                    </div>
                    <div class="security-note">
                        <strong>Security Note:</strong> IPv6 adoption is lower but growing. Ensure firewall rules cover both IPv4 and IPv6.
                    </div>
                </div>
            `).join('');

            // CNAME Records
            document.getElementById('cnameContent').innerHTML = data.cname.length ? data.cname.map(cn => `
                <div class="record-type">
                    <div class="record-data">${cn}</div>
                    <div class="record-explanation">
                        Canonical name alias for ${domain}.
                    </div>
                </div>
            `).join('') : '<div class="record-type">No CNAME records found</div>';

            // MX Records
            document.getElementById('mxContent').innerHTML = data.mx.map(mx => `
                <div class="record-type">
                    <div class="record-header">
                        <span class="record-name">Priority: ${mx.priority}</span>
                    </div>
                    <div class="record-data">${mx.host}</div>
                    <div class="record-explanation">
                        Mail server for ${domain}. Lower priority values are tried first.
                    </div>
                    <div class="security-note">
                        <strong>Security Note:</strong> MX records reveal email infrastructure. Check for mail server misconfigurations, open relays, and weak authentication (SPF/DKIM/DMARC).
                    </div>
                </div>
            `).join('');

            // TXT Records
            document.getElementById('txtContent').innerHTML = data.txt.map(txt => `
                <div class="record-type">
                    <div class="record-data">${txt}</div>
                    <div class="record-explanation">
                        Text record containing configuration data.
                    </div>
                    <div class="security-note">
                        <strong>Security Note:</strong> TXT records include SPF, DKIM, and DMARC policies. Review for misconfigurations that could enable email spoofing or domain hijacking.
                    </div>
                </div>
            `).join('');

            // NS Records
            document.getElementById('nsContent').innerHTML = data.ns.map(ns => `
                <div class="record-type">
                    <div class="record-data">${ns}</div>
                    <div class="record-explanation">
                        Nameserver responsible for DNS resolution of ${domain}.
                    </div>
                    <div class="security-note">
                        <strong>Security Note:</strong> NS records identify the DNS provider. Check for DNS takeover risks, DNS hijacking, and zone transfer vulnerabilities (AXFR).
                    </div>
                </div>
            `).join('');

            // SOA Record
            const soa = data.soa;
            document.getElementById('soaContent').innerHTML = `
                <div class="record-type">
                    <div class="record-header">
                        <span class="record-name">Primary Nameserver</span>
                    </div>
                    <div class="record-data">${soa.primary}</div>
                </div>
                <div class="record-type">
                    <div class="record-header">
                        <span class="record-name">Admin Email</span>
                    </div>
                    <div class="record-data">${soa.admin}</div>
                </div>
                <div class="record-type">
                    <div class="record-header">
                        <span class="record-name">Serial</span>
                    </div>
                    <div class="record-data">${soa.serial}</div>
                    <div class="record-explanation">Version number for zone updates</div>
                </div>
                <div class="record-type">
                    <div class="record-header">
                        <span class="record-name">Refresh (seconds)</span>
                    </div>
                    <div class="record-data">${soa.refresh}</div>
                    <div class="record-explanation">How often secondary nameservers check for updates</div>
                </div>
                <div class="record-type">
                    <div class="record-header">
                        <span class="record-name">TTL (Time To Live)</span>
                    </div>
                    <div class="record-data">${soa.ttl} seconds</div>
                    <div class="record-explanation">How long DNS results are cached</div>
                    <div class="security-note">
                        <strong>Security Note:</strong> Lower TTL increases resilience against DNS hijacking but raises query load. Balance security with performance.
                    </div>
                </div>
            `;
        }

        document.getElementById('domain').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') performDNSLookup();
        });
    </script>
</body>
